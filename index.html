<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Flashcards Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="debugTrigger" style="cursor: help;">English Questions</h1>

        <div id="debugOverlay" class="debug-overlay hidden">
            <div class="debug-content">
                <h3>Available System Voices <button id="closeDebug">X</button></h3>
                
                <div style="text-align: left; margin-bottom: 10px; padding: 5px; background: #fff3cd; border-radius: 8px;">
                    <label style="cursor: pointer; font-weight: bold;">
                        <input type="checkbox" id="priorityVoiceTick"> Use selected voice from table (Priority)
                    </label>
                </div>

                <div class="table-scroll">
                    <table id="voiceTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Lang</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div class="top-controls">
            <div class="settings-left">
                <div onclick="showDebugVoices()" class="control-box">
                    <label>Voice:</label>
                    <span id="currentVoiceName">Female</span>
                    <span id="voiceSelect" class="arrow-down"></span>
                </div>
                <div class="control-box">
                    <label>Timer:</label>
                    <select id="timerMode">
                        <option value="none">None</option>
                        <option value="up">Count Up</option>
                        <option value="down">Count Down</option>
                    </select>
                    <input type="number" id="inputTime" value="5"><span>s</span>
                </div>
            </div>

            <div class="settings-right">
                <label><input type="checkbox" id="shuffleTick"> Shuffle</label>
                <label><input type="checkbox" id="showTextTick" checked> Show Text</label>

                <div id="timerContainer" class="timer-wrapper hidden">
                    <span id="timerDisplay">00:00</span>
                </div>
            </div>
        </div>

        <div class="game-area">
            <div class="slot" id="leftSlot">
                </div>
            <div class="slot" id="rightSlot">
                </div>
        </div>

        <div class="footer-info">
            <div class="button-group">
                <button id="btnReset" class="btn">Reset Deck</button>
                <button id="btnUndo" class="btn">Undo (Alt)</button>
                <button id="btnPause" class="btn hidden">Pause (Ctrl)</button>
                <button id="btnDeal" class="btn-primary">Deal (Space)</button>
            </div>
            <p class="status">Progress: <span id="countDisplay">0</span>/50</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
